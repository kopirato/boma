<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boma Market</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo-area">

<img src="boma.png" class="logo">

<div>

<h1>BOMA MARKET</h1>

<p>From the Boma to the Market</p>

</div>

</div>

</header>


<nav>

<a href="#">Home</a>
<a href="#sell">Sell Livestock</a>
<a href="#market">Market</a>

</nav>


<section class="hero">

<h2>Buy and Sell Livestock Online</h2>

<p>Cattle • Sheep • Goats • Donkeys • Poultry</p>

</section>


<section id="sell" class="sell-form">

<h2>Sell Your Animal</h2>

<input id="name" placeholder="Animal Type">

<input id="age" placeholder="Age">

<input id="price" placeholder="Price (KES)">

<input id="location" placeholder="Location">

<input id="phone" placeholder="Phone (254...)">

<input id="image" placeholder="Image URL">

<button onclick="addAnimal()">Post Animal</button>

</section>


<section>

<h2 class="market-title">Livestock Market</h2>

<div id="market"></div>

</section>


<footer>

<p>Boma Market © 2026</p>

</footer>

<script src="script.js"></script>

</body>

</html>
