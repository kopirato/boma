<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boma Market PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
display:flex;
background:#f6f7fb;
color:#222;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:white;
border-right:1px solid #e6e6e6;
padding:25px;
position:fixed;
height:100%;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:12px 10px;
text-decoration:none;
color:#444;
border-radius:8px;
margin-bottom:5px;
transition:.2s;
}

.sidebar a:hover{
background:#f1f2f6;
}

/* MAIN */

.main{
margin-left:240px;
flex:1;
}

/* TOPBAR */

.topbar{
height:70px;
background:white;
border-bottom:1px solid #e6e6e6;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
}

.search{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
width:250px;
}

/* DASHBOARD */

.container{
padding:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
border:1px solid #eee;
}

.card h3{
font-size:14px;
color:#777;
}

.card p{
font-size:24px;
font-weight:600;
margin-top:10px;
}

/* TABLE */

.table{
background:white;
border-radius:10px;
border:1px solid #eee;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:15px;
text-align:left;
border-bottom:1px solid #f1f1f1;
}

th{
background:#fafafa;
font-weight:500;
}

/* BUTTON */

button{
padding:8px 16px;
border:none;
border-radius:6px;
background:#008060;
color:white;
cursor:pointer;
}

button:hover{
background:#006e52;
}

/* FORM */

.form{
background:white;
padding:25px;
border-radius:10px;
border:1px solid #eee;
margin-top:30px;
}

.form input,
.form select,
.form textarea{

width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-top:10px;
margin-bottom:15px;
}

/* IMAGE PREVIEW */

.preview{
max-width:150px;
margin-top:10px;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-left:0;
}

}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">Boma Market</div>

<a href="#">Dashboard</a>
<a href="#">Orders</a>
<a href="#">Livestock</a>
<a href="#">Customers</a>
<a href="#">Analytics</a>
<a href="#">Sell Animal</a>
<a href="#">Settings</a>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<input class="search" placeholder="Search livestock...">

<div>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

</div>

</div>

<div class="container">

<!-- ANALYTICS -->

<div class="cards">

<div class="card">
<h3>Total Listings</h3>
<p>128</p>
</div>

<div class="card">
<h3>Orders</h3>
<p>45</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p>KES 2.3M</p>
</div>

<div class="card">
<h3>Active Sellers</h3>
<p>67</p>
</div>

</div>

<!-- MARKET TABLE -->

<div class="table">

<table>

<thead>
<tr>
<th>Animal</th>
<th>Breed</th>
<th>Age</th>
<th>Weight</th>
<th>Location</th>
<th>Price</th>
<th></th>
</tr>
</thead>

<tbody>

<tr>
<td>Cattle</td>
<td>Boran</td>
<td>2 Years</td>
<td>400kg</td>
<td>Kajiado</td>
<td>KES 50,000</td>
<td><button>View</button></td>
</tr>

<tr>
<td>Goat</td>
<td>Galla</td>
<td>1 Year</td>
<td>50kg</td>
<td>Narok</td>
<td>KES 8,000</td>
<td><button>View</button></td>
</tr>

</tbody>

</table>

</div>

<!-- SELL FORM -->

<div class="form">

<h3>Post Livestock</h3>

<select id="name">
<option>Select Animal</option>
<option>Cattle</option>
<option>Goat</option>
<option>Sheep</option>
<option>Poultry</option>
</select>

<input id="breed" placeholder="Breed">

<input id="age" placeholder="Age">

<input id="weight" placeholder="Weight">

<input id="price" placeholder="Price">

<textarea id="description" placeholder="Description"></textarea>

<input type="file" id="imageUpload">

<img id="preview" class="preview">

<button id="postBtn">Post Animal</button>

</div>

</div>

</div>

<script>

const supabase = supabase.createClient(
'YOUR_SUPABASE_URL',
'YOUR_SUPABASE_KEY'
);

/* Image Preview */

document.getElementById("imageUpload").addEventListener("change",e=>{

const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(evt){

document.getElementById("preview").src=evt.target.result;

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>
