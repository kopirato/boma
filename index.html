<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boma Market PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  background:linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
             url('https://images.unsplash.com/photo-1500595046743-ee2a4a16f9c1') no-repeat center/cover;
  display:flex; min-height:100vh; color:white;
}
/* Sidebar */
.sidebar{width:230px; backdrop-filter:blur(12px); background:rgba(255,255,255,0.08); padding:25px; border-right:1px solid rgba(255,255,255,0.2);}
.logo{font-size:22px; font-weight:600; margin-bottom:35px;}
.navbtn{display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;cursor:pointer;margin-bottom:8px;transition:.2s;}
.navbtn:hover{background:rgba(255,255,255,0.15);}
/* Main */
.main{flex:1;display:flex;flex-direction:column;}
/* Topbar */
.topbar{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;backdrop-filter:blur(10px);background:rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.2);}
.search{padding:10px;border:none;border-radius:8px;width:240px;}
/* Screens */
.screen{display:none;padding:30px;}
.active{display:block;}
/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px;}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);padding:20px;border-radius:10px;}
.card p{font-size:24px;margin-top:10px;}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;}
.animal{background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;cursor:pointer;}
.animal img{width:100%;height:150px;object-fit:cover;}
.animal-info{padding:12px;}
.animal-info h4{margin-bottom:6px;}
/* Button & Form */
button{padding:6px 12px;border:none;border-radius:6px;background:#00c27a;color:white;cursor:pointer;margin-right:5px;margin-top:6px;}
.form{margin-top:30px;background:rgba(255,255,255,0.08);padding:20px;border-radius:10px;}
.form input,.form select,.form textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:none;}
/* Modal */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;}
.modal-box{background:white;color:black;padding:25px;border-radius:10px;width:420px;}
.modal-box img{width:100%;border-radius:8px;margin-bottom:10px;}
/* Auth Boxes */
.authBox{margin-bottom:20px;background:rgba(255,255,255,0.08);padding:15px;border-radius:8px;}
.authBox input{width:100%;margin-bottom:10px;padding:8px;border-radius:6px;border:none;}
.authBox button{width:100%;margin-top:5px;}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">Boma Market PRO</div>
<div class="navbtn" onclick="show('dashboard')">📊 Dashboard</div>
<div class="navbtn" onclick="show('market')">🐄 Livestock</div>
<div class="navbtn" onclick="show('orders')">🛒 Orders</div>
<div class="navbtn" onclick="show('wishlist')">❤️ Wishlist</div>
<div class="navbtn" onclick="show('analytics')">📈 Analytics</div>
</div>

<div class="main">

<div class="topbar">
<input class="search" placeholder="Search animals">
<div>
<button onclick="logout()">Logout</button>
</div>
</div>

<div id="dashboard" class="screen active">
<div class="cards">
<div class="card">Total Listings<p id="d1">0</p></div>
<div class="card">Cart Items<p id="d2">0</p></div>
<div class="card">Marketplace Value<p id="d3">0</p></div>
<div class="card">Wishlist<p id="d4">0</p></div>
</div>
<h3>Recent Animals</h3>
<div id="dashboardAnimals" class="grid"></div>
</div>

<div id="market" class="screen">
<div id="marketAnimals" class="grid"></div>
<div class="form">
<h3>Post Livestock</h3>
<select id="name">
<option>Cattle</option>
<option>Goat</option>
<option>Sheep</option>
<option>Poultry</option>
</select>
<input id="breed" placeholder="Breed">
<input id="age" placeholder="Age">
<input id="weight" placeholder="Weight">
<input id="price" placeholder="Price">
<textarea id="description" placeholder="Description"></textarea>
<input type="file" id="imageUpload">
<button onclick="postAnimal()">Post</button>
</div>
</div>

<div id="orders" class="screen">
<h3>Cart</h3>
<div id="cart"></div>
<button onclick="checkout()">Checkout</button>
</div>

<div id="wishlist" class="screen">
<h3>Wishlist</h3>
<div id="wishlistDiv"></div>
</div>

<div id="analytics" class="screen">
<h3>Marketplace Analytics</h3>
<p id="analyticsText"></p>
</div>

<div class="screen active" id="authScreen">
<div class="authBox">
<h3>Create Account</h3>
<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
</div>
<div class="authBox">
<h3>Login</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="modal" class="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<script type="module">
// Firebase SDK
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// Firebase config
const firebaseConfig = {
apiKey:"AIzaSyDjDxYGdNQsBYJN_bjtolJpk2rUXbBQVYk",
authDomain:"boma-market.firebaseapp.com",
projectId:"boma-market",
storageBucket:"boma-market.firebasestorage.app",
messagingSenderId:"26989669304",
appId:"1:26989669304:web:b604e90b152ba1af717d4d"
};

// Init
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let user = null;

// UI
function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); }
imageUpload.onchange = e => {
  let r = new FileReader();
  r.onload = x => { imageUpload.dataset.img = x.target.result; }
  r.readAsDataURL(e.target.files[0]);
}

// Firebase Auth
window.signup = async function(){
try{
let email=document.getElementById("signupEmail").value;
let password=document.getElementById("signupPassword").value;
let u = await createUserWithEmailAndPassword(auth,email,password);
await sendEmailVerification(u.user);
alert("Verification email sent. Check inbox.");
}catch(e){alert(e.message);}
}

window.login = async function(){
try{
let email=document.getElementById("loginEmail").value;
let password=document.getElementById("loginPassword").value;
let u = await signInWithEmailAndPassword(auth,email,password);
if(u.user.emailVerified){ alert("Login successful"); user=u.user; show('dashboard'); loadAnimals(); } else alert("Verify your email first.");
}catch(e){alert(e.message);}
}

window.logout = function(){ signOut(auth).then(()=>{ alert("Logged out"); user=null; show('authScreen'); }); }

// Firestore: Post Animal
window.postAnimal = async function(){
if(!user){ alert("Login first"); return; }
let img = imageUpload.dataset.img;
if(!img){ alert("Upload image"); return; }
let storageRef = ref(storage,'animals/'+Date.now());
await uploadString(storageRef,img,'data_url');
let url = await getDownloadURL(storageRef);
await addDoc(collection(db,'animals'),{
name:name.value, breed:breed.value, age:age.value, weight:weight.value, price:price.value, description:description.value, image:url, timestamp:Date.now()
});
alert("Animal posted!");
loadAnimals();
}

// Load Animals
async function loadAnimals(){
let snapshot = await getDocs(collection(db,'animals'));
marketAnimals.innerHTML=""; dashboardAnimals.innerHTML="";
snapshot.forEach(docSnap=>{
let a = docSnap.data();
let id=docSnap.id;
let card=document.createElement("div"); card.className="animal";
card.innerHTML=`<img src="${a.image}"><div class="animal-info"><h4>${a.name}</h4><p>KES ${a.price}</p><button onclick="addCart('${id}')">Cart</button><button onclick="addWish('${id}')">❤</button></div>`;
card.onclick=()=>viewAnimal(docSnap);
marketAnimals.appendChild(card);
dashboardAnimals.appendChild(card.cloneNode(true));
});
updateStats(snapshot);
}

// Modal
function viewAnimal(docSnap){
let a=docSnap.data();
modal.style.display="flex";
modalContent.innerHTML=`<img src="${a.image}"><h2>${a.name}</h2><p><b>Breed:</b> ${a.breed}</p><p><b>Age:</b> ${a.age}</p><p><b>Weight:</b> ${a.weight}</p><p><b>Price:</b> ${a.price}</p><p>${a.description}</p>`;
}

// Cart/Wishlist (simple local)
let cart=[], wishlist=[];
window.addCart=id=>{ cart.push(id); renderCart(); }
window.addWish=id=>{ wishlist.push(id); renderWish(); }
function renderCart(){ cartDiv.innerHTML=""; cart.forEach(a=>{ let d=document.createElement("div"); d.innerText=a; cartDiv.appendChild(d); }); }
function renderWish(){ wishlistDiv.innerHTML=""; wishlist.forEach(a=>{ let d=document.createElement("div"); d.innerText=a; wishlistDiv.appendChild(d); }); }

function checkout(){ alert("Order placed!"); cart=[]; renderCart(); }

function updateStats(snapshot){ 
d1.innerText=snapshot.size; 
d2.innerText=cart.length; 
d4.innerText=wishlist.length; 
let total=0; snapshot.forEach(d=>{total+=Number(d.data().price||0)}); d3.innerText="KES "+total; analyticsText.innerText=`Animals: ${snapshot.size}\nCart: ${cart.length}\nWishlist: ${wishlist.length}`;
}

// Monitor Auth State
onAuthStateChanged(auth,u=>{ if(u && u.emailVerified){ user=u; show('dashboard'); loadAnimals(); } else { user=null; show('authScreen'); } });

// Modal close
modal.onclick=()=>modal.style.display="none";

</script>
</body>
</html>
