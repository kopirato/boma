<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boma Market</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo-area">

<img src="boma.png" class="logo">

<div>

<h1>BOMA MARKET</h1>

<p>From the Boma to the Market</p>

</div>

</div>

</header>


<nav>

<a href="#">Home</a>

<a href="#sell">Sell Livestock</a>

<a href="#market">Market</a>

</nav>


<section class="hero">

<h2>Buy and Sell Livestock Online</h2>

<p>Cattle • Goats • Sheep • Donkeys • Poultry</p>

</section>



<section id="sell" class="sell-form">

<h2>Sell Your Livestock</h2>

<label>Animal Type</label>

<select id="name">

<option value="">Select Animal</option>

<option>Cattle</option>

<option>Goat</option>

<option>Sheep</option>

<option>Dorper Sheep</option>

<option>Donkey</option>

<option>Poultry</option>

</select>


<label>Age</label>

<select id="age">

<option value="">Select Age</option>

<option>3 months</option>

<option>6 months</option>

<option>1 year</option>

<option>2 years</option>

<option>3+ years</option>

</select>


<label>Price (KES)</label>

<input id="price" type="number" placeholder="Enter price">


<label>Location</label>

<select id="location">

<option>Kajiado</option>

<option>Narok</option>

<option>Samburu</option>

<option>Laikipia</option>

<option>Tanzania Border</option>

</select>


<label>Phone Number</label>

<input id="phone" placeholder="2547XXXXXXXX">


<label>Upload Animal Photo</label>

<input id="imageUpload" type="file" accept="image/*">


<button onclick="addAnimal()">Post Animal</button>

</section>



<section>

<h2 class="market-title">Livestock Market</h2>

<div id="market"></div>

</section>


<footer>

<p>Boma Market © 2026</p>

</footer>


<script src="script.js"></script>

</body>

</html>
