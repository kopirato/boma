<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Boma Market PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
display:flex;
background:#f6f7fb;
color:#222;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:white;
border-right:1px solid #e5e5e5;
padding:25px;
position:fixed;
height:100%;
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:12px;
margin-bottom:6px;
border-radius:8px;
text-decoration:none;
color:#333;
}

.sidebar a:hover{
background:#f1f2f6;
}

/* MAIN */

.main{
margin-left:240px;
flex:1;
}

/* TOPBAR */

.topbar{
height:70px;
background:white;
border-bottom:1px solid #e5e5e5;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
}

.search{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
width:260px;
}

/* CONTAINER */

.container{
padding:30px;
}

/* DASHBOARD CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
border:1px solid #eee;
}

.card h3{
font-size:14px;
color:#777;
}

.card p{
font-size:22px;
font-weight:600;
margin-top:10px;
}

/* TABLE */

.table{
background:white;
border-radius:10px;
border:1px solid #eee;
overflow:hidden;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
border-bottom:1px solid #f1f1f1;
}

th{
background:#fafafa;
}

/* BUTTON */

button{
padding:7px 14px;
border:none;
border-radius:6px;
background:#008060;
color:white;
cursor:pointer;
}

button:hover{
background:#006e52;
}

/* FORM */

.form{
background:white;
padding:25px;
border-radius:10px;
border:1px solid #eee;
}

.form input,
.form select,
.form textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
}

/* CART */

.panel{
background:white;
border:1px solid #eee;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.preview{
max-width:120px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">Boma Market</div>

<a>Dashboard</a>
<a>Orders</a>
<a>Livestock</a>
<a>Customers</a>
<a>Analytics</a>

</div>

<div class="main">

<div class="topbar">

<input class="search" placeholder="Search livestock">

<div>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

</div>

</div>

<div class="container">

<!-- DASHBOARD -->

<div class="cards">

<div class="card">
<h3>Total Listings</h3>
<p>0</p>
</div>

<div class="card">
<h3>Cart Items</h3>
<p>0</p>
</div>

<div class="card">
<h3>Total Value</h3>
<p>0</p>
</div>

<div class="card">
<h3>Wishlist</h3>
<p>0</p>
</div>

</div>

<!-- MARKET -->

<div class="table">

<table>

<thead>

<tr>
<th>Animal</th>
<th>Breed</th>
<th>Age</th>
<th>Weight</th>
<th>Price</th>
<th>Actions</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<!-- SELL FORM -->

<div class="form">

<h3>Post Livestock</h3>

<select id="name">
<option>Cattle</option>
<option>Goat</option>
<option>Sheep</option>
<option>Poultry</option>
</select>

<input id="breed" placeholder="Breed">

<input id="age" placeholder="Age">

<input id="weight" placeholder="Weight">

<input id="price" placeholder="Price">

<textarea id="description" placeholder="Description"></textarea>

<input type="file" id="imageUpload">

<img id="preview" class="preview">

<button id="postBtn">Post Animal</button>

</div>

<!-- CART -->

<div class="panel">

<h3>Cart</h3>

<div id="cartItems"></div>

<button onclick="checkout()">Checkout</button>

</div>

<!-- WISHLIST -->

<div class="panel">

<h3>Wishlist</h3>

<div id="wishlistItems"></div>

</div>

</div>

</div>

<script>

/* DATABASE */

let db={

animals:JSON.parse(localStorage.getItem("animals"))||[],
cart:JSON.parse(localStorage.getItem("cart"))||[],
wishlist:JSON.parse(localStorage.getItem("wishlist"))||[],
user:JSON.parse(localStorage.getItem("user"))||null

}

function save(){

localStorage.setItem("animals",JSON.stringify(db.animals))
localStorage.setItem("cart",JSON.stringify(db.cart))
localStorage.setItem("wishlist",JSON.stringify(db.wishlist))
localStorage.setItem("user",JSON.stringify(db.user))

}

/* AUTH */

loginBtn.onclick=()=>{

db.user={name:"User"}

save()

alert("Logged in")

}

logoutBtn.onclick=()=>{

db.user=null

save()

alert("Logged out")

}

/* IMAGE PREVIEW */

imageUpload.onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=x=>preview.src=x.target.result

reader.readAsDataURL(file)

}

/* POST */

postBtn.onclick=()=>{

if(!db.user){

alert("Login first")

return

}

let a={

id:Date.now(),
name:name.value,
breed:breed.value,
age:age.value,
weight:weight.value,
price:price.value,
description:description.value,
image:preview.src

}

db.animals.push(a)

save()

render()

}

/* RENDER MARKET */

function render(){

let tbody=document.querySelector("tbody")

tbody.innerHTML=""

db.animals.forEach(a=>{

let row=document.createElement("tr")

row.innerHTML=`

<td>${a.name}</td>
<td>${a.breed}</td>
<td>${a.age}</td>
<td>${a.weight}</td>
<td>KES ${a.price}</td>

<td>

<button onclick="viewAnimal(${a.id})">View</button>

<button onclick="addCart(${a.id})">Cart</button>

<button onclick="addWishlist(${a.id})">Wishlist</button>

<button onclick="deleteAnimal(${a.id})">Delete</button>

</td>

`

tbody.appendChild(row)

})

updateStats()

renderCart()

renderWishlist()

}

/* VIEW */

function viewAnimal(id){

let a=db.animals.find(x=>x.id===id)

alert(

`${a.name}
Breed: ${a.breed}
Age: ${a.age}
Weight: ${a.weight}
Price: ${a.price}`

)

}

/* DELETE */

function deleteAnimal(id){

db.animals=db.animals.filter(a=>a.id!==id)

save()

render()

}

/* CART */

function addCart(id){

let a=db.animals.find(x=>x.id===id)

db.cart.push(a)

save()

renderCart()

}

function renderCart(){

cartItems.innerHTML=""

db.cart.forEach(a=>{

let d=document.createElement("div")

d.innerHTML=`${a.name} - ${a.price} <button onclick="removeCart(${a.id})">Remove</button>`

cartItems.appendChild(d)

})

}

/* REMOVE CART */

function removeCart(id){

db.cart=db.cart.filter(a=>a.id!==id)

save()

renderCart()

}

/* WISHLIST */

function addWishlist(id){

let a=db.animals.find(x=>x.id===id)

db.wishlist.push(a)

save()

renderWishlist()

}

function renderWishlist(){

wishlistItems.innerHTML=""

db.wishlist.forEach(a=>{

let d=document.createElement("div")

d.innerHTML=`${a.name} - ${a.price} <button onclick="removeWishlist(${a.id})">Remove</button>`

wishlistItems.appendChild(d)

})

}

function removeWishlist(id){

db.wishlist=db.wishlist.filter(a=>a.id!==id)

save()

renderWishlist()

}

/* CHECKOUT */

function checkout(){

if(db.cart.length===0){

alert("Cart empty")

return

}

alert("Order placed!")

db.cart=[]

save()

renderCart()

}

/* SEARCH */

document.querySelector(".search").addEventListener("input",e=>{

let q=e.target.value.toLowerCase()

document.querySelectorAll("tbody tr").forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(q)?"":"none"

})

})

/* DASHBOARD */

function updateStats(){

document.querySelectorAll(".card p")[0].innerText=db.animals.length
document.querySelectorAll(".card p")[1].innerText=db.cart.length

let value=db.animals.reduce((s,a)=>s+Number(a.price||0),0)

document.querySelectorAll(".card p")[2].innerText="KES "+value
document.querySelectorAll(".card p")[3].innerText=db.wishlist.length

}

render()

</script>

</body>
</html>
